<script id="stockfish-code" type="text/plain">
let sf = null;
const URLS = [
  'https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js',
  'https://cdnjs.cloudflare.com/ajax/libs/stockfish.js/10.0.2/stockfish.js',
  'https://unpkg.com/stockfish.js@10.0.2/stockfish.js',
];
function load(){
  return new Promise((res,rej)=>{
    let i=0;
    function tryNext(){
      if(i>=URLS.length){ rej(new Error('all urls failed')); return; }
      try{ importScripts(URLS[i++]); res(); }
      catch(e){ tryNext(); }
    }
    tryNext();
  });
}
self.onmessage=async function(e){
  const msg=e.data;
  if(msg==='init'){
    try{
      await load();
      if(typeof STOCKFISH!=='undefined'){
        sf=STOCKFISH();
        sf.onmessage=function(ev){ self.postMessage(typeof ev==='string'?ev:ev.data); };
      } else if(typeof Stockfish!=='undefined'){
        sf=Stockfish();
        sf.addMessageListener(function(line){ self.postMessage(line); });
      } else { self.postMessage('error: no stockfish'); return; }
      sf.postMessage('uci');
      sf.postMessage('setoption name MultiPV value 3');
      sf.postMessage('setoption name Threads value 1');
      sf.postMessage('setoption name Hash value 32');
      sf.postMessage('isready');
    } catch(err){ self.postMessage('error: '+err.message); }
    return;
  }
  if(sf){ if(typeof sf.postMessage==='function') sf.postMessage(msg); }
};
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ── Constants ──────────────────────────────────────────────────────────────────
const FILES = ['a','b','c','d','e','f','g','h'];
const RANKS = ['8','7','6','5','4','3','2','1'];

// Chess.com style SVG pieces using unicode with CSS styling
const PIECE_UNICODE = {
  wK:'♔',wQ:'♕',wR:'♖',wB:'♗',wN:'♘',wP:'♙',
  bK:'♚',bQ:'♛',bR:'♜',bB:'♝',bN:'♞',bP:'♟'
};

const CLASS_META = {
  brilliant: {label:'Brilliant!!',color:'#1baca6',symbol:'!!',emoji:'💎',short:'!!',bg:'rgba(27,172,166,0.18)'},
  great:     {label:'Great!',     color:'#5b8dd9',symbol:'!', emoji:'⚡',short:'!', bg:'rgba(91,141,217,0.18)'},
  best:      {label:'Best',       color:'#7fa650',symbol:'',  emoji:'✓', short:'',  bg:'rgba(127,166,80,0.18)'},
  excellent: {label:'Excellent',  color:'#96bc4b',symbol:'!', emoji:'✨',short:'!', bg:'rgba(150,188,75,0.18)'},
  good:      {label:'Good',       color:'#96bc4b',symbol:'',  emoji:'👍',short:'',  bg:'rgba(150,188,75,0.12)'},
  inaccuracy:{label:'Inaccuracy', color:'#f0c040',symbol:'?!',emoji:'⚠️',short:'?!',bg:'rgba(240,192,64,0.18)'},
  mistake:   {label:'Mistake',    color:'#e07830',symbol:'?', emoji:'❌',short:'?', bg:'rgba(224,120,48,0.18)'},
  blunder:   {label:'Blunder',    color:'#c93838',symbol:'??',emoji:'💀',short:'??',bg:'rgba(201,56,56,0.18)'},
};

// ── Chess helpers ──────────────────────────────────────────────────────────────
function parsePGN(pgn){
  const game = new Chess();
  let ok = false;
  try { game.load_pgn(pgn,{sloppy:true}); ok=true; } catch{}
  if(!ok){
    const cleaned = pgn.replace(/\[.*?\]/g,'').replace(/\{[^}]*\}/g,'')
      .replace(/\([^)]*\)/g,'').replace(/\d+\.(\.\.)?\s*/g,'')
      .replace(/1-0|0-1|1\/2-1\/2|\*/g,'');
    const tokens = cleaned.trim().split(/\s+/).filter(Boolean);
    const g2 = new Chess();
    for(const t of tokens){ try{ if(!g2.move(t,{sloppy:true})) break; } catch{ break; } }
    if(g2.history().length>0) return buildData(g2);
    return null;
  }
  return buildData(game);
}

function buildData(game){
  const hist = game.history({verbose:true});
  const chess = new Chess();
  const positions = [chess.fen()];
  for(const m of hist){ chess.move(m); positions.push(chess.fen()); }
  const rawH = (game.header && typeof game.header==='function') ? game.header() : {};
  const header = Object.fromEntries(Object.entries(rawH).filter(([,v])=>v&&v!=='?'&&v!=='??'&&v!=='????.??.??'));
  return {
    moves: hist.map(m=>({
      san:m.san, uci:m.from+m.to+(m.promotion||''),
      from:m.from, to:m.to, color:m.color, piece:m.piece, captured:m.captured||null,
    })),
    positions, header,
  };
}

function classifyMove(cpLoss, wasBest){
  if(wasBest||cpLoss<=0) return 'best';
  if(cpLoss<=10)  return 'excellent';
  if(cpLoss<=25)  return 'good';
  if(cpLoss<=50)  return 'inaccuracy';
  if(cpLoss<=100) return 'mistake';
  return 'blunder';
}

function evalBarPct(cp){ return 50+(Math.atan((cp/100)*0.4)/Math.PI)*100; }

function calcAccuracy(anns,color){
  const moves=anns.filter((_,i)=>color==='w'?i%2===0:i%2===1);
  if(!moves.length) return 100;
  const sc=moves.map(m=>100*Math.exp(-0.004*Math.min(m.cpLoss||0,1000)));
  return Math.round(sc.reduce((a,b)=>a+b,0)/sc.length);
}

function sqCenter(sq,flipped,sz=60){
  const f=FILES.indexOf(sq[0]), r=RANKS.indexOf(sq[1]);
  const fi=flipped?7-f:f, ri=flipped?7-r:r;
  return {x:fi*sz+sz/2, y:ri*sz+sz/2};
}

function fmtScore(cp,isMate,mateIn){
  if(isMate) return mateIn>0?`+M${mateIn}`:`-M${Math.abs(mateIn)}`;
  const v=cp/100; return v>=0?`+${v.toFixed(2)}`:v.toFixed(2);
}

function explanation(ann){
  const {class:cls,cpLoss,san,bestMove,uci}=ann;
  const best=bestMove&&bestMove!==uci?` Best was ${bestMove}.`:'';
  const pawns=(Math.round(cpLoss/10)/10).toFixed(1);
  if(cls==='blunder')    return `${san} is a blunder — you lost ${pawns} pawns of advantage.${best}`;
  if(cls==='mistake')    return `${san} is a mistake — ${pawns} pawns lost.${best}`;
  if(cls==='inaccuracy') return `${san} is slightly inaccurate — ${pawns} pawns lost.${best}`;
  if(cls==='best')       return `${san} is the engine's top choice!`;
  if(cls==='excellent')  return `${san} is an excellent move — nearly perfect play.`;
  if(cls==='good')       return `${san} is a good, solid move.`;
  return `${san} is a reasonable move.`;
}

// ── Stockfish hook ─────────────────────────────────────────────────────────────
function useStockfish(){
  const [status,setStatus]=useState('loading');
  const wRef=useRef(null);
  const resolveRef=useRef(null);
  const bufRef=useRef([]);
  const queueRef=useRef([]);

  useEffect(()=>{
    let url=null;
    try{
      const code=document.getElementById('stockfish-code').textContent;
      const blob=new Blob([code],{type:'application/javascript'});
      url=URL.createObjectURL(blob);
      const w=new Worker(url);
      wRef.current=w;
      w.onmessage=e=>{
        const line=typeof e.data==='string'?e.data:String(e.data);
        if(line.startsWith('error:')){ setStatus('error'); return; }
        if(line==='readyok'){ setStatus('ready'); return; }
        bufRef.current.push(line);
        if(line.startsWith('bestmove')){
          const res=resolveRef.current; resolveRef.current=null;
          const result=[...bufRef.current]; bufRef.current=[];
          if(res) res(result);
          const next=queueRef.current.shift(); if(next) next();
        }
      };
      w.onerror=()=>setStatus('error');
      w.postMessage('init');
    } catch(err){ setStatus('error'); }
    return()=>{
      if(wRef.current){ try{wRef.current.terminate();}catch{} }
      if(url){ try{URL.revokeObjectURL(url);}catch{} }
    };
  },[]);

  const analyze=useCallback((fen,depth=20)=>new Promise((res,rej)=>{
    if(!wRef.current) return rej(new Error('no worker'));
    const task=()=>{
      bufRef.current=[];
      resolveRef.current=res;
      wRef.current.postMessage('stop');
      wRef.current.postMessage(`position fen ${fen}`);
      wRef.current.postMessage(`go depth ${depth}`);
    };
    if(!resolveRef.current) task(); else queueRef.current.push(task);
  }),[]);

  const stop=useCallback(()=>{
    if(wRef.current) wRef.current.postMessage('stop');
    resolveRef.current=null; bufRef.current=[]; queueRef.current=[];
  },[]);

  return {status,analyze,stop};
}

function parseEngine(lines){
  const mpMap={};
  for(const l of lines){
    if(!l.startsWith('info')||!l.includes('score')||!l.includes(' pv ')) continue;
    const mp=(l.match(/multipv (\d+)/)||[,'1'])[1];
    mpMap[mp]=l;
  }
  const bmLine=lines.find(l=>l.startsWith('bestmove'));
  const bestmove=bmLine?bmLine.split(' ')[1]:null;
  const pvs=Object.entries(mpMap).map(([mp,l])=>{
    const cp=(l.match(/score cp (-?\d+)/)||[,0])[1];
    const mate=(l.match(/score mate (-?\d+)/)||[,null])[1];
    const pvM=l.match(/ pv ([a-h][1-8][a-h][1-8][qrbn]?(?:\s[a-h][1-8][a-h][1-8][qrbn]?)*)/);
    const isMate=mate!==null; const mateIn=isMate?parseInt(mate):0;
    const score=isMate?(mateIn>0?30000:-30000):parseInt(cp);
    return {rank:parseInt(mp),score,isMate,mateIn,moves:pvM?pvM[1].trim().split(/\s+/):[]};
  }).sort((a,b)=>a.rank-b.rank);
  return {pvs,bestmove};
}

// ── Chess.com API ──────────────────────────────────────────────────────────────
async function fetchChesscomGames(username, maxGames=50){
  // Get archives list
  const archRes = await fetch(`https://api.chess.com/pub/player/${username}/games/archives`);
  if(!archRes.ok) throw new Error('Player not found on Chess.com');
  const archData = await archRes.json();
  const archives = archData.archives || [];
  if(!archives.length) throw new Error('No games found');
  
  // Get latest archive
  const latestUrl = archives[archives.length-1];
  const gamesRes = await fetch(latestUrl);
  if(!gamesRes.ok) throw new Error('Failed to fetch games');
  const gamesData = await gamesRes.json();
  const games = (gamesData.games || []).reverse().slice(0,maxGames);
  
  return games.map(g => ({
    id: g.uuid || g.url,
    white: g.white?.username || 'White',
    black: g.black?.username || 'Black',
    whiteRating: g.white?.rating,
    blackRating: g.black?.rating,
    result: g.white?.result,
    timeClass: g.time_class,
    timeControl: g.time_control,
    date: g.end_time ? new Date(g.end_time*1000).toLocaleDateString() : '',
    pgn: g.pgn,
    url: g.url,
    source: 'chesscom',
    myColor: g.white?.username?.toLowerCase()===username.toLowerCase()?'white':'black',
  }));
}

async function fetchLichessGames(username, maxGames=50){
  const res = await fetch(`https://lichess.org/api/games/user/${username}?max=${maxGames}&pgnInJson=true&opening=true`,{
    headers:{'Accept':'application/x-ndjson'}
  });
  if(!res.ok) throw new Error('Player not found on Lichess');
  const text = await res.text();
  const lines = text.trim().split('\n').filter(Boolean);
  return lines.map(line=>{
    try{
      const g = JSON.parse(line);
      const myColor = g.players?.white?.user?.id===username.toLowerCase()?'white':'black';
      const result = g.winner==='white'?'win': g.winner==='black'?'loss':'draw';
      const myResult = (myColor==='white'&&g.winner==='white')||(myColor==='black'&&g.winner==='black')?'win':
                       g.winner?'loss':'draw';
      // Build PGN from moves
      let pgn = '';
      if(g.players?.white?.user) pgn += `[White "${g.players.white.user.name}"]\n`;
      if(g.players?.black?.user) pgn += `[Black "${g.players.black.user.name}"]\n`;
      if(g.moves) pgn += '\n' + g.moves;
      return {
        id: g.id,
        white: g.players?.white?.user?.name || 'White',
        black: g.players?.black?.user?.name || 'Black',
        whiteRating: g.players?.white?.rating,
        blackRating: g.players?.black?.rating,
        result: myResult,
        timeClass: g.speed,
        timeControl: g.clock?`${g.clock.initial/60}+${g.clock.increment}`:'',
        date: g.createdAt?new Date(g.createdAt).toLocaleDateString():'',
        pgn: g.pgn || pgn,
        url: `https://lichess.org/${g.id}`,
        source: 'lichess',
        myColor,
        opening: g.opening?.name,
      };
    } catch{ return null; }
  }).filter(Boolean);
}

function Board({fen,flipped,lastMove,arrows,sz=64,highlights=[]}){
  const board=useMemo(()=>{
    if(!fen) return null;
    try{ const g=new Chess(fen); return g.board(); } catch{ return null; }
  },[fen]);

  if(!board){
    const bSz=sz*8;
    return (
      <div style={{width:bSz,height:bSz,display:'flex',flexDirection:'column'}}>
        {[...Array(8)].map((_,ri)=>(
          <div key={ri} style={{display:'flex',flex:1}}>
            {[...Array(8)].map((_,fi)=>{
              const isLight=(ri+fi)%2===0;
              return <div key={fi} style={{flex:1,background:isLight?'var(--sq-light)':'var(--sq-dark)'}}/>;
            })}
          </div>
        ))}
      </div>
    );
  }

  const ranks=flipped?[...RANKS].reverse():RANKS;
  const files=flipped?[...FILES].reverse():FILES;
  const bSz=sz*8;

  const hlSet=new Set(highlights);

  return (
    <div style={{position:'relative',width:bSz,height:bSz,userSelect:'none',flexShrink:0,
      borderRadius:4,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.6)'}}>
      {/* Board squares */}
      <div style={{display:'grid',gridTemplateColumns:`repeat(8,${sz}px)`,width:bSz,height:bSz}}>
        {ranks.map((rank,ri)=>files.map((file,fi)=>{
          const sq=file+rank;
          const isLight=(ri+fi)%2===0;
          const isLast=lastMove&&(lastMove.from===sq||lastMove.to===sq);
          const isHl=hlSet.has(sq);
          const ri2=flipped?7-ri:ri, fi2=flipped?7-fi:fi;
          const piece=board[ri2]?.[fi2];
          let bg=isLight?'var(--sq-light)':'var(--sq-dark)';
          if(isLast) bg=isLight?'var(--sq-light-hl)':'var(--sq-dark-hl)';
          if(isHl) bg=isLight?'rgba(20,85,255,0.4)':'rgba(20,85,255,0.5)';
          const pk=piece?(piece.color+piece.type.toUpperCase()):null;
          return (
            <div key={sq} style={{width:sz,height:sz,background:bg,
              display:'flex',alignItems:'center',justifyContent:'center',
              position:'relative'}}>
              {/* Coordinate labels */}
              {fi===0&&<span style={{position:'absolute',top:2,left:3,fontSize:Math.max(9,sz*0.14),fontWeight:700,
                color:isLight?'var(--sq-dark)':'var(--sq-light)',opacity:0.85,lineHeight:1}}>{rank}</span>}
              {ri===7&&<span style={{position:'absolute',bottom:2,right:3,fontSize:Math.max(9,sz*0.14),fontWeight:700,
                color:isLight?'var(--sq-dark)':'var(--sq-light)',opacity:0.85,lineHeight:1}}>{file}</span>}
              {/* Piece */}
              {pk&&<PieceSVG type={piece.type} color={piece.color} size={sz*0.82}/>}
            </div>
          );
        }))}
      </div>
      {/* SVG overlay for arrows */}
      <svg style={{position:'absolute',top:0,left:0,width:bSz,height:bSz,pointerEvents:'none'}}
        viewBox={`0 0 ${bSz} ${bSz}`}>
        <defs>
          {['green','blue','orange','red','teal'].map(c=>{
            const fill={green:'#4caf50',blue:'#4a90d9',orange:'#e07830',red:'#c93838',teal:'#4da8a0'}[c];
            return <marker key={c} id={`arr-${c}`} markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
              <path d="M0,0.5 L6,3.5 L0,6.5 Z" fill={fill} opacity="0.92"/>
            </marker>;
          })}
        </defs>
        {arrows.map((a,i)=>{
          const from=sqCenter(a.from,flipped,sz);
          const to=sqCenter(a.to,flipped,sz);
          const dx=to.x-from.x, dy=to.y-from.y;
          const ex=from.x+dx*0.83, ey=from.y+dy*0.83;
          const sx=from.x+dx*0.17, sy=from.y+dy*0.17;
          const col={green:'#4caf50',blue:'#4a90d9',orange:'#e07830',red:'#c93838',teal:'#4da8a0'}[a.color]||'#4caf50';
          return <line key={i} x1={sx} y1={sy} x2={ex} y2={ey}
            stroke={col} strokeWidth={sz*0.14} strokeOpacity={0.85}
            strokeLinecap="round" markerEnd={`url(#arr-${a.color||'green'})`}/>;
        })}
      </svg>
    </div>
  );
}

// ── Eval Bar ───────────────────────────────────────────────────────────────────
function EvalBar({cp=0,isMate=false,mateIn=0,height=480}){
  const whitePct=evalBarPct(cp);
  const v=cp/100;
  const score=isMate?(mateIn>0?`M${mateIn}`:`-M${Math.abs(mateIn)}`):(v>=0?`+${v.toFixed(1)}`:v.toFixed(1));
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,marginRight:8,flexShrink:0}}>
      <div style={{fontSize:10,fontWeight:700,fontFamily:'var(--mono)',
        color:cp>=0?'var(--text-0)':'var(--text-2)',letterSpacing:0.5,
        background:cp>=0?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.3)',
        padding:'2px 5px',borderRadius:3,minWidth:36,textAlign:'center'}}>{score}</div>
      <div style={{width:22,height,borderRadius:4,overflow:'hidden',
        background:'#111',position:'relative',flexShrink:0,border:'1px solid rgba(255,255,255,0.08)'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:`${100-whitePct}%`,
          background:'#1a1a1a',transition:'height 0.5s cubic-bezier(0.4,0,0.2,1)'}}/>
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:`${whitePct}%`,
          background:'#f0f0f0',transition:'height 0.5s cubic-bezier(0.4,0,0.2,1)'}}/>
        <div style={{position:'absolute',top:'50%',left:0,right:0,height:1,background:'rgba(128,128,128,0.3)'}}/>
      </div>
    </div>
  );
}

// ── Eval Graph ─────────────────────────────────────────────────────────────────
function EvalGraph({evalHistory,annotations,currentMove,onSeek}){
  const H=70;
  if(evalHistory.length<2) return null;
  const n=evalHistory.length;
  const pts=evalHistory.map((e,i)=>({x:i,y:evalBarPct(e.cp||0)}));
  const W=460;
  const toX=i=>(i/(n-1))*W;
  const toY=p=>H-(p/100)*H;
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'}${toX(p.x).toFixed(1)},${toY(p.y).toFixed(1)}`).join(' ');
  const wArea=`${pathD} L${toX(n-1)},${H/2} L0,${H/2} Z`;
  const bArea=`${pathD} L${toX(n-1)},0 L0,0 Z`;
  const curX=currentMove<n?toX(currentMove):toX(n-1);
  const curY=currentMove<n?toY(pts[currentMove]?.y||50):H/2;

  return (
    <div style={{padding:'8px 10px 6px',borderBottom:'1px solid var(--border)'}}>
      <div style={{fontSize:10,color:'var(--text-3)',marginBottom:5,
        textTransform:'uppercase',letterSpacing:1.5,fontWeight:600}}>Evaluation</div>
      <svg width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
        style={{display:'block',cursor:'pointer',borderRadius:3}}
        onClick={e=>{
          const r=e.currentTarget.getBoundingClientRect();
          const idx=Math.round(((e.clientX-r.left)/r.width)*(n-1));
          onSeek(Math.max(0,Math.min(n-1,idx)));
        }}>
        <rect width={W} height={H} fill="var(--bg-0)"/>
        <path d={wArea} fill="rgba(240,240,240,0.18)" clipPath="url(#cwh2)"/>
        <path d={bArea} fill="rgba(0,0,0,0.5)" clipPath="url(#cbk2)"/>
        <defs>
          <clipPath id="cwh2"><rect x={0} y={H/2} width={W} height={H/2}/></clipPath>
          <clipPath id="cbk2"><rect x={0} y={0} width={W} height={H/2}/></clipPath>
        </defs>
        <line x1={0} y1={H/2} x2={W} y2={H/2} stroke="rgba(255,255,255,0.1)" strokeWidth={1}/>
        <path d={pathD} fill="none" stroke="rgba(127,166,80,0.9)" strokeWidth={1.5} strokeLinejoin="round"/>
        {annotations.map((a,i)=>{
          if(!['blunder','mistake'].includes(a.class)) return null;
          const idx=i+1; if(idx>=n) return null;
          const x=toX(idx), y=toY(pts[idx]?.y||50);
          const col=CLASS_META[a.class]?.color;
          return <circle key={i} cx={x} cy={y} r={3.5} fill={col} opacity={0.9}/>;
        })}
        <line x1={curX} y1={0} x2={curX} y2={H} stroke="rgba(255,255,255,0.25)" strokeWidth={1} strokeDasharray="3,3"/>
        <circle cx={curX} cy={curY} r={4} fill="#fff" stroke="var(--accent)" strokeWidth={2}/>
      </svg>
    </div>
  );
}

// ── Move List ──────────────────────────────────────────────────────────────────
function MoveList({moves,annotations,currentMove,onSelect}){
  const activeRef=useRef(null);
  useEffect(()=>{ if(activeRef.current) activeRef.current.scrollIntoView({block:'nearest',behavior:'smooth'}); },[currentMove]);
  const rows=[];
  for(let i=0;i<moves.length;i+=2) rows.push([moves[i],moves[i+1]]);

  return (
    <div style={{flex:1,overflowY:'auto',padding:'4px 2px'}}>
      {rows.map((pair,ri)=>(
        <div key={ri} style={{display:'flex',alignItems:'center',padding:'1px 4px'}}>
          <span style={{width:26,flexShrink:0,fontSize:11,color:'var(--text-3)',
            fontFamily:'var(--mono)',paddingLeft:4}}>{ri+1}.</span>
          {[0,1].map(side=>{
            const mv=pair[side]; if(!mv) return <span key={side} style={{flex:1}}/>;
            const idx=ri*2+side;
            const ann=annotations[idx];
            const isActive=currentMove===idx+1;
            const meta=ann?CLASS_META[ann.class]:null;
            return (
              <button key={side} ref={isActive?activeRef:null} onClick={()=>onSelect(idx+1)}
                style={{flex:1,padding:'3px 6px',margin:'1px',
                  background:isActive?'var(--bg-3)':'transparent',
                  border:`1px solid ${isActive?'var(--border-light)':'transparent'}`,
                  borderRadius:4,cursor:'pointer',
                  color:meta?meta.color:'var(--text-0)',
                  fontSize:13,fontWeight:isActive?600:400,
                  display:'flex',alignItems:'center',gap:3,transition:'all 0.1s'}}>
                <span>{mv.san}</span>
                {meta?.symbol&&<span style={{fontSize:10,fontWeight:800,opacity:0.9}}>{meta.symbol}</span>}
                {ann&&meta&&<span style={{width:5,height:5,borderRadius:'50%',
                  background:meta.color,flexShrink:0,marginLeft:'auto',opacity:0.7}}/>}
              </button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

// ── Accuracy Ring ──────────────────────────────────────────────────────────────
function AccuracyRing({value,label,color,size=72}){
  const r=size*0.38, stroke=size*0.07;
  const circ=2*Math.PI*r, prog=(value/100)*circ;
  const c=size/2;
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
      <div style={{position:'relative',width:size,height:size}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
          <circle cx={c} cy={c} r={r} fill="none" stroke="var(--bg-4)" strokeWidth={stroke}/>
          <circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={circ} strokeDashoffset={circ-prog} strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1)'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:size*0.28,fontWeight:800,color,lineHeight:1}}>{value}</span>
          <span style={{fontSize:size*0.13,color:'var(--text-3)',fontWeight:600,marginTop:1}}>%</span>
        </div>
      </div>
      <div style={{fontSize:11,color:'var(--text-2)',fontWeight:600}}>{label}</div>
    </div>
  );
}

// ── Summary Panel ──────────────────────────────────────────────────────────────
function Summary({accuracy,annotations,header}){

  for(const a of annotations) counts[a.class]=(counts[a.class]||0)+1;

  const accColor=a=>a>=90?'#7fa650':a>=75?'#96bc4b':a>=60?'#f0c040':a>=45?'#e07830':'#c93838';

          </div>
        </div>
      )}

function App(){
  const {status:engineStatus,analyze,stop}=useStockfish();
  const [gameData,setGameData]=useState(null);
  const [annotations,setAnnotations]=useState([]);
  const [evalHistory,setEvalHistory]=useState([]);
  const [accuracy,setAccuracy]=useState({white:0,black:0});
  const [currentMove,setCurrentMove]=useState(0);
  const [isAnalyzing,setIsAnalyzing]=useState(false);
  const [progress,setProgress]=useState(0);
  const [tab,setTab]=useState('analysis');
  const [sidePanel,setSidePanel]=useState('moves'); // 'moves' | 'games'
  const [flipped,setFlipped]=useState(false);
  const [autoPlay,setAutoPlay]=useState(false);
  const [showPGNModal,setShowPGNModal]=useState(false);
  const [showAccountModal,setShowAccountModal]=useState(false);
  const [account,setAccount]=useState(null);
  const [page,setPage]=useState('home');
  const autoRef=useRef(null);
  const analysisRef=useRef(false);
  const boardSz=64;

  // Keyboard nav
  useEffect(()=>{
    const h=e=>{
      if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft') setCurrentMove(m=>Math.max(0,m-1));
      if(e.key==='ArrowRight') setCurrentMove(m=>gameData?Math.min(gameData.positions.length-1,m+1):m);
      if(e.key==='ArrowUp') setCurrentMove(0);
      if(e.key==='ArrowDown') setCurrentMove(m=>gameData?gameData.positions.length-1:m);
      if(e.key==='f'||e.key==='F') setFlipped(f=>!f);
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[gameData]);

  // Auto-play
  useEffect(()=>{
    clearInterval(autoRef.current);
    if(autoPlay&&gameData){
      autoRef.current=setInterval(()=>{
        setCurrentMove(m=>{
          if(m>=gameData.positions.length-1){ setAutoPlay(false); return m; }
          return m+1;
        });
      },800);
    }
    return()=>clearInterval(autoRef.current);
  },[autoPlay,gameData]);

  const handleLoadPGN=useCallback(pgnText=>{
    const data=parsePGN(pgnText);
    if(!data||!data.moves.length) return false;
    stop();
    setAnnotations([]); setEvalHistory([]); setAccuracy({white:0,black:0});
    setCurrentMove(0); setProgress(0); setGameData(data);
    setShowPGNModal(false); setPage('analysis');
    return true;
  },[stop]);

  const handleSelectGame=useCallback(game=>{
    if(game.pgn) handleLoadPGN(game.pgn);
  },[handleLoadPGN]);

  const runAnalysis=useCallback(async()=>{
    if(!gameData||isAnalyzing||engineStatus!=='ready') return;
    setIsAnalyzing(true); setAnnotations([]); setEvalHistory([]);
    analysisRef.current=true;
    const {positions,moves}=gameData;
    const evals=[]; const anns=[];
    for(let i=0;i<positions.length;i++){
      if(!analysisRef.current) break;
      setProgress(Math.round((i/positions.length)*100));
      try{
        const lines=await analyze(positions[i],20);
        const {pvs,bestmove}=parseEngine(lines);
        const isBlack=positions[i].includes(' b ');
        const top=pvs[0];
        const cp=top?(isBlack?-top.score:top.score):0;
        evals.push({cp,isMate:top?.isMate||false,mateIn:top?.mateIn||0,pvs,bestmove});
        if(i>0&&moves[i-1]){
          const prev=evals[i-1]; const curr=evals[i];
          const mv=moves[i-1]; const isW=mv.color==='w';
          const cpLoss=isW?Math.max(0,prev.cp-curr.cp):Math.max(0,curr.cp-prev.cp);
          const wasBest=prev.bestmove?(mv.uci===prev.bestmove||mv.uci===prev.bestmove.slice(0,4)):false;
          const cls=classifyMove(cpLoss,wasBest);
          anns.push({...mv,class:cls,cpLoss,scoreAfter:curr.cp,scoreBefore:prev.cp,
            bestMove:prev.bestmove,pvs:curr.pvs,pvScore:curr.pvs?.[0]?.score});
        }
        setEvalHistory([...evals]); setAnnotations([...anns]);
      } catch(err){
        evals.push({cp:evals[evals.length-1]?.cp||0,pvs:[],bestmove:null});
        if(i>0&&moves[i-1]) anns.push({...moves[i-1],class:'good',cpLoss:0,scoreAfter:0,pvs:[]});
      }
    }
    if(analysisRef.current){
      setAccuracy({white:calcAccuracy(anns,'w'),black:calcAccuracy(anns,'b')});
      setProgress(100);
    }
    analysisRef.current=false; setIsAnalyzing(false);
  },[gameData,isAnalyzing,engineStatus,analyze]);

  const abort=()=>{ analysisRef.current=false; stop(); setIsAnalyzing(false); };

  const curFen=gameData?.positions[currentMove]||null;
  const curAnn=annotations[currentMove-1]||null;
  const curEval=evalHistory[currentMove]||evalHistory[evalHistory.length-1]||null;
  const lastMove=currentMove>0?gameData?.moves[currentMove-1]:null;
  const totalMoves=gameData?.positions.length||0;

  // Arrows
  const arrows=[];
  if(curAnn?.bestMove&&curAnn.bestMove!==curAnn.uci){
    arrows.push({from:curAnn.bestMove.slice(0,2),to:curAnn.bestMove.slice(2,4),color:'green'});
  }
  if(curAnn&&['blunder','mistake'].includes(curAnn.class)){
    arrows.push({from:curAnn.from,to:curAnn.to,color:curAnn.class==='blunder'?'red':'orange'});
  }

  // ── HOME PAGE ─────────────────────────────────────────────────────────────
  if(page==='home'){
    return (
      <div style={{minHeight:'100vh',background:'var(--bg-0)',display:'flex',flexDirection:'column'}}>
        <nav style={{height:54,borderBottom:'1px solid var(--border)',display:'flex',

            <button onClick={()=>setShowAccountModal(true)}

              🔗 Connect Account
            </button>
            <button onClick={()=>{ setPage('analysis'); setShowPGNModal(true); }}
              style={{padding:'6px 16px',borderRadius:7,fontSize:13,fontWeight:700,
                background:'var(--accent)',border:'none',color:'#fff',
                boxShadow:'0 2px 8px rgba(127,166,80,0.3)'}}>
              Start Analyzing
            </button>
          </div>
        </nav>

        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',padding:'60px 24px',textAlign:'center',maxWidth:900,margin:'0 auto',width:'100%'}}>

          {/* Hero */}
          <div style={{display:'inline-flex',alignItems:'center',gap:6,padding:'4px 14px',
            borderRadius:20,marginBottom:24,background:'rgba(127,166,80,0.12)',
            border:'1px solid rgba(127,166,80,0.3)',fontSize:11,color:'var(--accent-light)',fontWeight:700,letterSpacing:1}}>
            ⚡ FREE · STOCKFISH POWERED · NO SIGNUP
          </div>

          <div style={{fontSize:14,color:'var(--text-3)',marginBottom:10,fontWeight:600,letterSpacing:2,textTransform:'uppercase'}}>
            Chess Game Analysis
          </div>
          <h1 style={{fontSize:'clamp(36px,5vw,62px)',fontWeight:900,lineHeight:1.1,marginBottom:16}}>
            <span style={{color:'var(--text-0)'}}>Analyze Like</span>{' '}
            <span style={{color:'var(--accent)'}}>a Pro.</span>
          </h1>
          <p style={{fontSize:15,color:'var(--text-2)',maxWidth:480,lineHeight:1.8,marginBottom:40}}>

          <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center',marginBottom:60}}>
            <button onClick={()=>{ setPage('analysis'); setShowPGNModal(true); }}
              style={{padding:'13px 30px',borderRadius:9,fontSize:15,fontWeight:800,
                background:'var(--accent)',color:'#fff',
                boxShadow:'0 4px 16px rgba(127,166,80,0.35)'}}>

              {i:'📊',t:'Evaluation Bar',d:'Live position assessment with smooth animation'},
              {i:'🤖',t:'Stockfish Depth 20',d:'3 engine lines per position with MultiPV'},
              {i:'🎯',t:'8 Classifications',d:'From Brilliant !! to Blunder ?? like Chess.com'},
              {i:'📈',t:'Accuracy Score',d:'Chess.com-style accuracy % for both players'},
              {i:'🔗',t:'Account Import',d:'Connect Chess.com or Lichess to import games'},
              {i:'⌨️',t:'Keyboard Nav',d:'Arrow keys to navigate, F to flip board'},
            ].map((f,i)=>(
              <div key={i} style={{padding:'18px',background:'var(--bg-1)',

                <div style={{fontSize:12,color:'var(--text-3)',lineHeight:1.6}}>{f.d}</div>

        </footer>

        {showAccountModal&&<AccountModal onClose={()=>setShowAccountModal(false)}
          onConnect={acc=>{ setAccount(acc); setShowAccountModal(false); setPage('analysis'); setSidePanel('games'); }}/>}
      </div>
    );
  }

  // ── ANALYSIS PAGE ─────────────────────────────────────────────────────────
  const statusColor={ready:'#7fa650',loading:'#f0c040',error:'#c93838'}[engineStatus]||'#555';
  const statusText={ready:'Stockfish Ready',loading:'Loading Engine…',error:'Engine Error'}[engineStatus]||'…';

  const accColor=a=>a>=90?'#7fa650':a>=75?'#96bc4b':a>=60?'#f0c040':a>=45?'#e07830':'#c93838';

  return (
    <div style={{height:'100vh',background:'var(--bg-0)',display:'flex',flexDirection:'column',overflow:'hidden'}}>

              background:'var(--bg-3)',border:'1px solid var(--border)',color:'var(--text-1)'}}>
            {account?`♟ ${account.username}`:'🔗 Account'}
          </button>

          <button onClick={()=>setShowPGNModal(true)}
            style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,
              background:'var(--bg-3)',border:'1px solid var(--border)',color:'var(--text-1)'}}>
            + PGN
          </button>

          {gameData&&!isAnalyzing&&(
            <button onClick={runAnalysis} disabled={engineStatus!=='ready'}
              style={{padding:'4px 12px',borderRadius:6,fontSize:12,fontWeight:700,
                background:'var(--accent)',color:'#fff',
                boxShadow:'0 2px 6px rgba(127,166,80,0.3)'}}>
              ⚡ Analyze
            </button>
          )}
          {isAnalyzing&&(
            <button onClick={abort}
              style={{padding:'4px 10px',borderRadius:6,fontSize:11,fontWeight:600,
                background:'rgba(201,56,56,0.15)',border:'1px solid rgba(201,56,56,0.3)',color:'#f87171'}}>
              ■ Stop {progress}%
            </button>
          )}
        </div>
      </nav>

      {/* Progress bar */}
      {isAnalyzing&&(
        <div style={{height:2,background:'var(--bg-3)',flexShrink:0}}>
          <div style={{height:'100%',width:`${progress}%`,background:'var(--accent)',
            transition:'width 0.4s ease'}}/>
        </div>
      )}

      {/* BODY */}
      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* LEFT SIDEBAR — Games */}
        <div style={{width:280,borderRight:'1px solid var(--border)',background:'var(--bg-1)',
          display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>
          <GamesBrowser account={account} onSelectGame={handleSelectGame}
            onAddAccount={()=>setShowAccountModal(true)}/>
        </div>

        {/* CENTER — Board */}
        <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
          justifyContent:'center',padding:'12px',gap:8,overflow:'auto',minWidth:0}}>

          {/* Black player bar */}
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',
            borderRadius:7,background:'var(--bg-1)',border:'1px solid var(--border)',
            width:boardSz*8+30,flexShrink:0}}>
            <span style={{fontSize:18}}>♚</span>
            <span style={{fontWeight:600,fontSize:13,flex:1}}>
              {flipped?(gameData?.header?.White||'White'):(gameData?.header?.Black||'Black')}
              {(flipped?gameData?.header?.WhiteElo:gameData?.header?.BlackElo)&&
                <span style={{color:'var(--text-3)',fontWeight:400,fontSize:11,marginLeft:6}}>
                  ({flipped?gameData.header.WhiteElo:gameData.header.BlackElo})
                </span>}
            </span>
            {annotations.length>0&&(
              <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,
                color:accColor(flipped?accuracy.white:accuracy.black)}}>
                {flipped?accuracy.white:accuracy.black}%
              </span>
            )}
          </div>

          {/* Board row */}
          <div style={{display:'flex',alignItems:'flex-start',gap:0,flexShrink:0}}>
            <EvalBar cp={curEval?.cp||0} isMate={curEval?.isMate||false} mateIn={curEval?.mateIn||0}
              height={boardSz*8}/>
            <Board fen={curFen} flipped={flipped} lastMove={lastMove} arrows={arrows} sz={boardSz}/>
          </div>

          {/* White player bar */}
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',
            borderRadius:7,background:'var(--bg-1)',border:'1px solid var(--border)',
            width:boardSz*8+30,flexShrink:0}}>
            <span style={{fontSize:18}}>♔</span>
            <span style={{fontWeight:600,fontSize:13,flex:1}}>
              {flipped?(gameData?.header?.Black||'Black'):(gameData?.header?.White||'White')}
              {(flipped?gameData?.header?.BlackElo:gameData?.header?.WhiteElo)&&
                <span style={{color:'var(--text-3)',fontWeight:400,fontSize:11,marginLeft:6}}>
                  ({flipped?gameData.header.BlackElo:gameData.header.WhiteElo})
                </span>}
            </span>
            {annotations.length>0&&(
              <span style={{fontFamily:'var(--mono)',fontSize:12,fontWeight:700,
                color:accColor(flipped?accuracy.black:accuracy.white)}}>
                {flipped?accuracy.black:accuracy.white}%
              </span>
            )}
          </div>

          {/* Controls */}
          <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            {[
              {icon:'⏮',action:()=>setCurrentMove(0),title:'Start'},
              {icon:'◀',action:()=>setCurrentMove(m=>Math.max(0,m-1)),title:'Previous (←)'},
              {icon:autoPlay?'⏸':'▶',action:()=>setAutoPlay(p=>!p),active:autoPlay,title:'Auto-play'},
              {icon:'▶',action:()=>setCurrentMove(m=>Math.min(totalMoves-1,m+1)),title:'Next (→)'},
              {icon:'⏭',action:()=>setCurrentMove(totalMoves-1),title:'End'},
            ].map((b,i)=>(
              <button key={i} onClick={b.action} title={b.title}
                style={{width:34,height:34,borderRadius:6,
                  background:b.active?'var(--accent)':'var(--bg-2)',
                  border:`1px solid ${b.active?'var(--accent)':'var(--border)'}`,
                  color:b.active?'#fff':'var(--text-1)',fontSize:14,
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                {b.icon}
              </button>
            ))}
            <div style={{width:1,height:18,background:'var(--border)',margin:'0 2px'}}/>
            <button onClick={()=>setFlipped(f=>!f)} title="Flip board (F)"
              style={{width:34,height:34,borderRadius:6,background:'var(--bg-2)',
                border:'1px solid var(--border)',color:'var(--text-1)',fontSize:14,
                display:'flex',alignItems:'center',justifyContent:'center'}}>⇅</button>
          </div>

          <div style={{fontSize:10,color:'var(--text-3)',textAlign:'center'}}>
            {gameData?`Move ${currentMove} / ${totalMoves-1}  ·  ← → navigate  ·  F flip`:'Load a PGN or connect your account to get started'}
          </div>
        </div>

        {/* RIGHT SIDEBAR — Analysis */}
        <div style={{width:300,borderLeft:'1px solid var(--border)',background:'var(--bg-1)',
          display:'flex',flexDirection:'column',flexShrink:0,overflow:'hidden'}}>

          {/* Tabs */}
          <div style={{display:'flex',borderBottom:'1px solid var(--border)',flexShrink:0}}>
            {[['analysis','Analysis'],['summary','Summary']].map(([id,lbl])=>(
              <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:'10px 0',
                background:tab===id?'var(--bg-2)':'transparent',border:'none',
                borderBottom:tab===id?'2px solid var(--accent)':'2px solid transparent',
                color:tab===id?'var(--accent)':'var(--text-3)',
                fontSize:12,fontWeight:tab===id?700:500,cursor:'pointer',transition:'all 0.15s'}}>
                {lbl}
              </button>
            ))}
          </div>

          {tab==='analysis'&&(
            <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <EvalGraph evalHistory={evalHistory.map(e=>({cp:e.cp}))} annotations={annotations}
                currentMove={currentMove} onSeek={setCurrentMove}/>
              {gameData?.moves.length>0&&(
                <MoveList moves={gameData.moves} annotations={annotations}
                  currentMove={currentMove} onSelect={setCurrentMove}/>
              )}
              {!gameData&&(
                <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
                  justifyContent:'center',padding:'24px',textAlign:'center',color:'var(--text-3)'}}>
                  <div style={{fontSize:32,marginBottom:8}}>♟</div>
                  <div style={{fontSize:13,fontWeight:600,color:'var(--text-1)',marginBottom:6}}>No game loaded</div>
                  <div style={{fontSize:12,marginBottom:14,lineHeight:1.6}}>Load a PGN or import from your account</div>
                  <button onClick={()=>setShowPGNModal(true)}
                    style={{padding:'8px 16px',borderRadius:7,background:'var(--accent)',
                      color:'#fff',fontSize:12,fontWeight:700,border:'none'}}>
                    + Load PGN
                  </button>
                </div>
              )}
              <div style={{borderTop:'1px solid var(--border)',flexShrink:0,minHeight:100,overflow:'auto'}}>
                <AnnotationPanel ann={curAnn} moveNum={currentMove}/>
              </div>
            </div>
          )}

          {tab==='summary'&&(
            <div style={{flex:1,overflowY:'auto'}}>
              <Summary accuracy={accuracy} annotations={annotations} header={gameData?.header}/>
            </div>
          )}
        </div>
      </div>

      {/* Modals */}
      {showPGNModal&&<PGNModal onLoad={handleLoadPGN} onClose={()=>setShowPGNModal(false)}/>}
      {showAccountModal&&<AccountModal onClose={()=>setShowAccountModal(false)}
        onConnect={acc=>{ setAccount(acc); setShowAccountModal(false); setSidePanel('games'); }}/>}

      <style>{`
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        @keyframes spin{to{transform:rotate(360deg)}}
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
